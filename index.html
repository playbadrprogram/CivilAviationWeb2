<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي الطيران اليمني ثلاثي الأبعاد</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a2a3a; font-family: sans-serif; }
        #mobilePanel { position: fixed; bottom: 20px; left: 20px; z-index: 1000; direction: ltr; display: flex; flex-wrap: wrap; width: 220px; }
        #mobilePanel button { width: 60px; height: 60px; font-size: 24px; margin: 4px; background: rgba(255,255,255,0.8); border: 2px solid #333; border-radius: 12px; cursor: pointer; -webkit-user-select: none; user-select: none; font-weight: bold; }
        #mobilePanel button:active { background: #00ffcc; }
        #hudPanel { position: fixed; top: 10px; right: 10px; color: white; font-size: 16px; background: rgba(0,0,0,0.6); padding: 12px; z-index: 1000; border-radius: 8px; line-height: 1.5; text-align: right; direction: rtl; border: 1px solid rgba(255,255,255,0.2); }
        #phaseDisplay { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); color: #00ffcc; font-size: 20px; font-weight: bold; background: rgba(0,0,0,0.7); padding: 6px 16px; border-radius: 5px; z-index: 1000; text-shadow: 0 0 5px #00ffcc; text-align: center; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="mobilePanel">
    <button id="upBtn">▲</button>
    <button id="downBtn">▼</button>
    <button id="leftBtn">◀</button>
    <button id="rightBtn">▶</button>
    <button id="pitchUpBtn">W</button>
    <button id="pitchDownBtn">S</button>
</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        try {
            // =====================================
            // إعداد المشهد والكاميرا والمحرك
            // =====================================
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 20000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // الإضاءة المشعة لظهور تفاصيل الطائرة
            const ambient = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(200, 400, 200);
            scene.add(sun);

            // الأرضية مع ممر الإقلاع الرئيسي الممتد طويلاً تحت الطائرة
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(15000, 15000),
                new THREE.MeshStandardMaterial({ color: 0x2e7d32 })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // =====================================
            // المطارات والمباني والغيوم
            // =====================================
            const airports = [];
            function createAirport(name, x, z) {
                const runway = new THREE.Mesh(new THREE.BoxGeometry(100, 0.1, 1500), new THREE.MeshStandardMaterial({ color: 0x333333 }));
                runway.position.set(x, 0.05, z);
                scene.add(runway);

                const terminal = new THREE.Mesh(new THREE.BoxGeometry(120, 25, 60), new THREE.MeshStandardMaterial({ color: 0xcccccc }));
                terminal.position.set(x + 140, 12, z);
                scene.add(terminal);

                airports.push({ name: name, position: new THREE.Vector3(x, 0, z) });
            }
            createAirport("مطار صنعاء", 0, 0);
            createAirport("مطار عدن", 2500, 3000);
            createAirport("مطار المكلا", -3200, 2800);

            for (let i = 0; i < 50; i++) {
                const cloud = new THREE.Mesh(new THREE.SphereGeometry(25, 8, 8), new THREE.MeshStandardMaterial({ color: 0xffffff }));
                cloud.position.set((Math.random() - 0.5) * 10000, 250 + Math.random() * 200, (Math.random() - 0.5) * 10000);
                scene.add(cloud);
            }

            const buildings = [];
            for (let i = 0; i < 150; i++) {
                const h = 50 + Math.random() * 100;
                const building = new THREE.Mesh(new THREE.BoxGeometry(25, h, 25), new THREE.MeshStandardMaterial({ color: 0x555555 }));
                let x = (Math.random() - 0.5) * 6000;
                let z = (Math.random() - 0.5) * 6000;
                if (Math.sqrt(x*x + z*z) > 800) {
                    building.position.set(x, h / 2, z);
                    scene.add(building);
                    buildings.push(building);
                }
            }

            // =====================================
            // هندسة بناء الطائرة برمجياً بالكامل تفصيلياً (معدلة طولياً)
            // =====================================
            function buildDetailedAircraft() {
                const aircraftGroup = new THREE.Group();

                // المواد والألوان
                const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4 });
                const blueMat = new THREE.MeshStandardMaterial({ color: 0x0a3c7a, roughness: 0.5 });
                const darkMat = new THREE.MeshStandardMaterial({ color: 0x222222 });

                // 1. جسم الطائرة الرئيسي (Fuselage) - ممتد على المحور Z (طولياً)
                const body = new THREE.Mesh(new THREE.CylinderGeometry(1.4, 1.4, 18, 16), whiteMat);
                body.rotation.x = Math.PI / 2; // تدوير ليصبح ممتداً للأمام والخلف
                aircraftGroup.add(body);

                // 2. مقدمة الطائرة المدببة (Cockpit Nose) - متجهة للأمام (Z سالب)
                const nose = new THREE.Mesh(new THREE.ConeGeometry(1.4, 4, 16), whiteMat);
                nose.rotation.x = -Math.PI / 2;
                nose.position.z = -11;
                aircraftGroup.add(nose);

                // زجاج كابينة القيادة
                const cockpitWindow = new THREE.Mesh(new THREE.SphereGeometry(0.8, 8, 8), darkMat);
                cockpitWindow.position.set(0, 0.6, -10.5);
                cockpitWindow.scale.set(1, 0.5, 1.5);
                aircraftGroup.add(cockpitWindow);

                // 3. الأجنحة الرئيسية المتطورة (Main Wings) - ممتدة عرضياً بدقة
                const wingLeft = new THREE.Mesh(new THREE.BoxGeometry(12, 0.2, 5), whiteMat);
                wingLeft.position.set(-6, -0.2, 0);
                wingLeft.rotation.y = -Math.PI / 6; // مائل للخلف انسيابياً
                aircraftGroup.add(wingLeft);

                const wingRight = new THREE.Mesh(new THREE.BoxGeometry(12, 0.2, 5), whiteMat);
                wingRight.position.set(6, -0.2, 0);
                wingRight.rotation.y = Math.PI / 6;
                aircraftGroup.add(wingRight);

                // 4. المحركات النفاثة تحت الأجنحة (Engines) - متجهة للأمام طويلاً
                const engineLeft = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.4, 3, 12), blueMat);
                engineLeft.rotation.x = Math.PI / 2;
                engineLeft.position.set(-4, -0.9, -1);
                aircraftGroup.add(engineLeft);

                const engineRight = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.4, 3, 12), blueMat);
                engineRight.rotation.x = Math.PI / 2;
                engineRight.position.set(4, -0.9, -1);
                aircraftGroup.add(engineRight);

                // 5. مجموعة الذيل الخلفي (Tail Assembly)
                // الموازن العمودي الخلفي (Vertical Stabilizer)
                const tailFin = new THREE.Mesh(new THREE.BoxGeometry(0.3, 4, 3), blueMat);
                tailFin.position.set(0, 2.2, 8);
                tailFin.rotation.x = -Math.PI / 6;
                aircraftGroup.add(tailFin);

                // الموازن الأفقي الخلفي (Horizontal Stabilizers)
                const tailWingLeft = new THREE.Mesh(new THREE.BoxGeometry(4, 0.15, 2), whiteMat);
                tailWingLeft.position.set(-2, 0, 8.5);
                tailWingLeft.rotation.y = -Math.PI / 6;
                aircraftGroup.add(tailWingLeft);

                const tailWingRight = new THREE.Mesh(new THREE.BoxGeometry(4, 0.15, 2), whiteMat);
                tailWingRight.position.set(2, 0, 8.5);
                tailWingRight.rotation.y = Math.PI / 6;
                aircraftGroup.add(tailWingRight);

                // تكبير حجم الطائرة الكلي بنسبة 10% (من 0.35 إلى 0.385)
                aircraftGroup.scale.set(0.385, 0.385, 0.385);
                return aircraftGroup;
            }

            const aircraft = buildDetailedAircraft();
            aircraft.position.set(0, 2, 0);
            scene.add(aircraft);

            // =====================================
            // نظام حركة الطيران والتحكم
            // =====================================
            let speed = 0, fuel = 100, altitude = 2, pitch = 0, verticalSpeed = 0;
            let flightPhase = "تدريج (TAXI)";
            const keys = {};

            const hud = document.createElement("div"); hud.id = "hudPanel"; document.body.appendChild(hud);
            const phaseDiv = document.createElement("div"); phaseDiv.id = "phaseDisplay"; document.body.appendChild(phaseDiv);

            function bindBtn(id, action, stopAction) {
                const btn = document.getElementById(id); if (!btn) return;
                btn.addEventListener("touchstart", (e) => { e.preventDefault(); action(); });
                btn.addEventListener("touchend", () => { if(stopAction) stopAction(); });
                btn.addEventListener("mousedown", () => { action(); });
                btn.addEventListener("mouseup", () => { if(stopAction) stopAction(); });
            }

            bindBtn("upBtn", () => { keys["up"] = true; }, () => { keys["up"] = false; });
            bindBtn("downBtn", () => { keys["down"] = true; }, () => { keys["down"] = false; });
            bindBtn("leftBtn", () => { keys["left"] = true; }, () => { keys["left"] = false; });
            bindBtn("rightBtn", () => { keys["right"] = true; }, () => { keys["right"] = false; });
            bindBtn("pitchUpBtn", () => { keys["w"] = true; }, () => { keys["w"] = false; });
            bindBtn("pitchDownBtn", () => { keys["s"] = true; }, () => { keys["s"] = false; });

            function updateFlight() {
                if (keys["up"] && fuel > 0) speed += 0.005;
                if (keys["down"]) speed -= 0.005;
                speed = Math.max(0, Math.min(0.8, speed)) * 0.995;

                if (keys["left"]) aircraft.rotation.y += 0.025;
                if (keys["right"]) aircraft.rotation.y -= 0.025;
                if (keys["w"]) pitch += 0.01;
                if (keys["s"]) pitch -= 0.01;
                pitch = Math.max(-0.4, Math.min(0.4, pitch));
                
                // التحكم بزاوية الارتفاع والاصطدام (الـ Pitch ممتد حول المحور X الآن)
                aircraft.rotation.x = pitch;

                let lift = (speed > 0.22) ? (speed - 0.22) * 0.025 * (1 - pitch) : 0;
                verticalSpeed += lift - 0.003;
                altitude += verticalSpeed;

                if (altitude < 2) { altitude = 2; verticalSpeed = 0; }
                aircraft.position.y = altitude;

                flightPhase = altitude < 4 ? "تدريج (TAXI)" : "طيران مستقر (CRUISE)";

                // دفع الطائرة للأمام باتجاه مقدمتها الصحيحة (Z سالب)
                const direction = new THREE.Vector3(0, 0, -1).applyQuaternion(aircraft.quaternion);
                aircraft.position.addScaledVector(direction, speed * 12);
                fuel = Math.max(0, fuel - (speed * 0.005));
            }

            // حلقة اللعب والتحديث المستمر
            function animate() {
                requestAnimationFrame(animate);
                updateFlight();

                // الكاميرا تتبع الطائرة من الخلف بشكل طولي متناسق ومريح للرؤية
                const offset = new THREE.Vector3(0, 8, 48).applyQuaternion(aircraft.quaternion);
                camera.position.copy(aircraft.position).add(offset);
                camera.lookAt(aircraft.position.clone().add(new THREE.Vector3(0, 2, -10).applyQuaternion(aircraft.quaternion)));

                // تحديث العدادات
                hud.innerHTML = `<b>السرعة:</b> ${Math.round(speed * 1200)} عقدة<br><b>الارتفاع:</b> ${Math.round(altitude * 10)} قدم<br><b>الوقود:</b> ${Math.round(fuel)} %`;
                phaseDiv.innerText = `الوضعية: ${flightPhase}`;

                renderer.render(scene, camera);
            }

            window.addEventListener("resize", () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();

        } catch (error) {
            console.error("حدث خطأ:", error);
        }
    });
</script>
</body>
</html>
