<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي الطيران اليمني الاحترافي</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a2a3a; font-family: sans-serif; }
        #mobilePanel { position: fixed; bottom: 20px; left: 20px; z-index: 1000; direction: ltr; display: flex; flex-wrap: wrap; width: 220px; }
        #mobilePanel button { width: 60px; height: 60px; font-size: 24px; margin: 4px; background: rgba(255,255,255,0.8); border: 2px solid #333; border-radius: 12px; cursor: pointer; -webkit-user-select: none; user-select: none; font-weight: bold; }
        #mobilePanel button:active { background: #00ffcc; }
        #hudPanel { position: fixed; top: 10px; right: 10px; color: white; font-size: 16px; background: rgba(0,0,0,0.6); padding: 12px; z-index: 1000; border-radius: 8px; line-height: 1.5; text-align: right; direction: rtl; border: 1px solid rgba(255,255,255,0.2); }
        #phaseDisplay { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); color: #00ffcc; font-size: 20px; font-weight: bold; background: rgba(0,0,0,0.7); padding: 6px 16px; border-radius: 5px; z-index: 1000; text-shadow: 0 0 5px #00ffcc; text-align: center; }
        #crashScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.85); z-index: 5000; justify-content: center; align-items: center; flex-direction: column; color: white; font-size: 30px; font-weight: bold; cursor: pointer; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="crashScreen" onclick="location.reload()">
    <div>💥 تحطمت الطائرة! 💥</div>
    <div style="font-size: 18px; margin-top: 15px;">إضغط هنا لإعادة المحاولة</div>
</div>

<div id="mobilePanel">
    <button id="upBtn">▲</button>
    <button id="downBtn">▼</button>
    <button id="leftBtn">◀</button>
    <button id="rightBtn">▶</button>
    <button id="pitchUpBtn">W</button>
    <button id="pitchDownBtn">S</button>
</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        try {
            // =====================================
            // إعداد الصوت والمحرك الافتراضي
            // =====================================
            const bgAudio = new Audio('engain.mp3'); 
            bgAudio.loop = true;
            let audioStarted = false;

            function startEngineAudio() {
                if (!audioStarted) {
                    bgAudio.play().catch(e => console.log("تحتاج للتفاعل أولاً لتشغيل الصوت"));
                    audioStarted = true;
                }
            }

            // إعداد المشهد والكاميرا
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);

            const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 25000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // الإضاءة المشعة
            const ambient = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0xffffff, 1.4);
            sun.position.set(400, 800, 300);
            scene.add(sun);

            // الأرضية العشبية العامة
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(20000, 20000),
                new THREE.MeshStandardMaterial({ color: 0x3b7a57, roughness: 0.9 })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // =====================================
            // بناء ممر الطيران والمطار بواقعية
            // =====================================
            const runwayGroup = new THREE.Group();
            
            // أسفلت الممر الرئيسي
            const asphalt = new THREE.Mesh(
                new THREE.BoxGeometry(120, 0.2, 3000),
                new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 })
            );
            asphalt.position.set(0, 0.1, 0);
            runwayGroup.add(asphalt);

            // الخطوط البيضاء المتقطعة في المنتصف
            for (let z = -1400; z <= 1400; z += 100) {
                const line = new THREE.Mesh(
                    new THREE.BoxGeometry(3, 0.25, 40),
                    new THREE.MeshStandardMaterial({ color: 0xffffff })
                );
                line.position.set(0, 0.2, z);
                runwayGroup.add(line);
            }

            // الخطوط الصفراء الجانبية للممر
            const leftLine = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.24, 3000), new THREE.MeshStandardMaterial({ color: 0xffcc00 }));
            leftLine.position.set(-58, 0.2, 0);
            runwayGroup.add(leftLine);

            const rightLine = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.24, 3000), new THREE.MeshStandardMaterial({ color: 0xffcc00 }));
            rightLine.position.set(58, 0.2, 0);
            runwayGroup.add(rightLine);

            scene.add(runwayGroup);

            // =====================================
            // بناء الأبراج والمباني الحقيقية بنوافذ
            // =====================================
            const collidableObjects = [];

            // دالة لصنع ناطحة سحاب تفصيلية بنوافذ
            function createRealisticBuilding(x, z) {
                const bWidth = 30 + Math.random() * 20;
                const bHeight = 80 + Math.random() * 150;
                const bDepth = 30 + Math.random() * 20;

                const buildingM = new THREE.Mesh(
                    new THREE.BoxGeometry(bWidth, bHeight, bDepth),
                    new THREE.MeshStandardMaterial({ color: 0x334455, roughness: 0.5 })
                );
                buildingM.position.set(x, bHeight / 2, z);
                scene.add(buildingM);
                collidableObjects.push(buildingM);

                // إضافة نوافذ مضيئة برمجياً على واجهات المبنى
                const winGeom = new THREE.BoxGeometry(bWidth + 0.4, 1.5, bDepth + 0.4);
                const winMat = new THREE.MeshStandardMaterial({ color: 0xfffaed, emissive: 0xddcc99, emissiveIntensity: 0.5 });
                
                for (let y = 10; y < bHeight - 10; y += 15) {
                    const windowRow = new THREE.Mesh(winGeom, winMat);
                    windowRow.position.set(x, y, z);
                    scene.add(windowRow);
                }
            }

            // دالة بناء برج مراقبة المطار التفصيلي
            function createControlTower(x, z) {
                const towerGroup = new THREE.Group();
                
                // القاعدة العمودية
                const base = new THREE.Mesh(new THREE.CylinderGeometry(5, 7, 70, 12), new THREE.MeshStandardMaterial({ color: 0xddeeee }));
                base.position.y = 35;
                towerGroup.add(base);

                // كابينة المراقبة الزجاجية العلوية
                const cabin = new THREE.Mesh(new THREE.CylinderGeometry(10, 7, 12, 12), new THREE.MeshStandardMaterial({ color: 0x112233, transparent: true, opacity: 0.7 }));
                cabin.position.y = 76;
                towerGroup.add(cabin);

                // سقف البرج
                const roof = new THREE.Mesh(new THREE.CylinderGeometry(11, 11, 2, 12), new THREE.MeshStandardMaterial({ color: 0xcc3333 }));
                roof.position.y = 83;
                towerGroup.add(roof);

                towerGroup.position.set(x, 0, z);
                scene.add(towerGroup);
                
                // إضافة القاعدة للحواجز لمنع الاختراق
                collidableObjects.push(base);
            }

            // توزيع الأبراج والمباني حول المطار
            createControlTower(110, -200);
            
            for (let i = 0; i < 80; i++) {
                let bx = (Math.random() - 0.5) * 5000;
                let bz = (Math.random() - 0.5) * 5000;
                if (Math.abs(bx) > 150 || Math.abs(bz) > 1600) {
                    createRealisticBuilding(bx, bz);
                }
            }

            // غيوم البيئة الافتراضية
            for (let i = 0; i < 40; i++) {
                const cloud = new THREE.Mesh(new THREE.SphereGeometry(30, 8, 8), new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1.0 }));
                cloud.position.set((Math.random() - 0.5) * 8000, 300 + Math.random() * 300, (Math.random() - 0.5) * 8000);
                scene.add(cloud);
            }

            // =====================================
            // تصميم أجنحة الطائرة وجسمها بشكل واقعي
            // =====================================
            function buildAdvancedAircraft() {
                const group = new THREE.Group();

                const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
                const blueMat = new THREE.MeshStandardMaterial({ color: 0x0a3c7a, roughness: 0.4 });
                const darkMat = new THREE.MeshStandardMaterial({ color: 0x111111 });

                // 1. جسم الطائرة الاسطواني الانسيابي
                const body = new THREE.Mesh(new THREE.CylinderGeometry(1.4, 1.1, 20, 16), whiteMat);
                body.rotation.x = Math.PI / 2;
                group.add(body);

                // 2. مقدمة الطائرة المخروطية الانسيابية
                const nose = new THREE.Mesh(new THREE.ConeGeometry(1.4, 4, 16), whiteMat);
                nose.rotation.x = -Math.PI / 2;
                nose.position.z = -12;
                group.add(nose);

                // قمرة القيادة السوداء الزجاجية
                const cockpit = new THREE.Mesh(new THREE.SphereGeometry(0.8, 8, 8), darkMat);
                cockpit.position.set(0, 0.6, -11.4);
                cockpit.scale.set(1.3, 0.5, 1.6);
                group.add(cockpit);

                // 3. أجنحة الركاب الحقيقية العريضة (Tapered Shape)
                const wingShape = new THREE.Shape();
                wingShape.moveTo(0, 0);
                wingShape.lineTo(13, -3);   // امتداد وطول الجناح
                wingShape.lineTo(12.5, -5); // نهاية الجناح الخلفية الضيقة
                wingShape.lineTo(0, -2);   // الالتصاق بجسم الطائرة خلفاً

                const extrudeSettings = { depth: 0.2, bevelEnabled: true, bevelSegments: 2, steps: 1, bevelSize: 0.05, bevelThickness: 0.05 };
                
                // الجناح الأيمن
                const wingGeoRight = new THREE.ExtrudeGeometry(wingShape, extrudeSettings);
                const wingR = new THREE.Mesh(wingGeoRight, whiteMat);
                wingR.rotation.x = Math.PI / 2;
                wingR.position.set(0.8, -0.2, 2);
                group.add(wingR);

                // الجناح الأيسر المقابل
                const wingGeoLeft = new THREE.ExtrudeGeometry(wingShape, extrudeSettings);
                const wingL = new THREE.Mesh(wingGeoLeft, whiteMat);
                wingL.rotation.x = Math.PI / 2;
                wingL.rotation.y = Math.PI; 
                wingL.position.set(-0.8, -0.2, 2);
                group.add(wingL);

                // 4. محركات نفاثة قوية تحت الأجنحة
                const engLeft = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.5, 4, 12), blueMat);
                engLeft.rotation.x = Math.PI / 2;
                engLeft.position.set(-5, -1.0, 0);
                group.add(engLeft);

                const engRight = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.5, 4, 12), blueMat);
                engRight.rotation.x = Math.PI / 2;
                engRight.position.set(5, -1.0, 0);
                group.add(engRight);

                // 5. ذيل الطائرة والـ Fin الأزرق
                const tailFin = new THREE.Mesh(new THREE.BoxGeometry(0.3, 4.5, 3.5), blueMat);
                tailFin.position.set(0, 2.5, 9);
                tailFin.rotation.x = -Math.PI / 5;
                group.add(tailFin);

                const tailWingR = new THREE.Mesh(new THREE.BoxGeometry(4.5, 0.15, 2.2), whiteMat);
                tailWingR.position.set(2.5, 0, 9.5);
                tailWingR.rotation.y = Math.PI / 6;
                group.add(tailWingR);

                const tailWingL = new THREE.Mesh(new THREE.BoxGeometry(4.5, 0.15, 2.2), whiteMat);
                tailWingL.position.set(-2.5, 0, 9.5);
                tailWingL.rotation.y = -Math.PI / 6;
                group.add(tailWingL);

                // ضبط الحجم بدقة 10% إضافية للحجم الكلي المطلوب
                group.scale.set(0.385, 0.385, 0.385);
                return group;
            }

            const aircraft = buildAdvancedAircraft();
            aircraft.position.set(0, 2, 1200); // بدء اللعبة من أول المدرج للخلف
            scene.add(aircraft);

            // =====================================
            // نظام الحركة، الاصطدامات والتحكم
            // =====================================
            let speed = 0, fuel = 100, altitude = 2, pitch = 0, verticalSpeed = 0;
            let flightPhase = "تدريج (TAXI)";
            let isCrashed = false;
            const keys = {};

            const hud = document.createElement("div"); hud.id = "hudPanel"; document.body.appendChild(hud);
            const phaseDiv = document.createElement("div"); phaseDiv.id = "phaseDisplay"; document.body.appendChild(phaseDiv);

            function bindBtn(id, key) {
                const btn = document.getElementById(id); if (!btn) return;
                btn.addEventListener("touchstart", (e) => { e.preventDefault(); startEngineAudio(); keys[key] = true; });
                btn.addEventListener("touchend", () => { keys[key] = false; });
                btn.addEventListener("mousedown", () => { startEngineAudio(); keys[key] = true; });
                btn.addEventListener("mouseup", () => { keys[key] = false; });
            }

            bindBtn("upBtn", "up"); bindBtn("downBtn", "down");
            bindBtn("leftBtn", "left"); bindBtn("rightBtn", "right");
            bindBtn("pitchUpBtn", "w"); bindBtn("pitchDownBtn", "s");

            function updateFlight() {
                if (isCrashed) return;

                // زيادة السرعة والتحكم في درجة تفاعل الصوت ومستوى التردد
                if (keys["up"] && fuel > 0) speed += 0.006;
                if (keys["down"]) speed -= 0.006;
                speed = Math.max(0, Math.min(0.85, speed)) * 0.996;

                // تحديث سرعة صوت المحرك مع سرعة الطائرة ديناميكياً
                if (audioStarted) {
                    bgAudio.playbackRate = 0.8 + (speed * 1.2);
                    bgAudio.volume = 0.3 + (speed * 0.7);
                }

                if (keys["left"]) aircraft.rotation.y += 0.022;
                if (keys["right"]) aircraft.rotation.y -= 0.022;
                
                // تصليح نظام الهبوط والرفع بمرونة تامة عبر الـ Pitch
                if (keys["w"]) pitch += 0.008; // رفع الطائرة لأعلى
                if (keys["s"]) pitch -= 0.008; // خفض الطائرة لأسفل للهبوط
                pitch = Math.max(-0.35, Math.min(0.35, pitch));
                aircraft.rotation.x = pitch;

                // ميكانيكية حساب قوى الرفع الهوائي والهبوط
                let lift = (speed > 0.22) ? (speed - 0.22) * 0.03 * (1 - pitch) : 0;
                verticalSpeed += lift - 0.0035;
                altitude += verticalSpeed;

                // تفعيل ملامسة الأرض ومنع تخطي ممر المطار للأسفل
                if (altitude < 2) { 
                    altitude = 2; 
                    verticalSpeed = 0; 
                    pitch = pitch * 0.8; // إرجاع مقدمة الطائرة لوضعها الطبيعي على الأرض
                }
                aircraft.position.y = altitude;

                flightPhase = altitude < 3.5 ? "تدريج (TAXI)" : "طيران مستقر (CRUISE)";

                // دفع الطائرة للأمام
                const direction = new THREE.Vector3(0, 0, -1).applyQuaternion(aircraft.quaternion);
                aircraft.position.addScaledVector(direction, speed * 15);
                fuel = Math.max(0, fuel - (speed * 0.004));

                // 🛑 اختبار التحقق من الاصطدام بالمباني لحظر الاختراق
                const aircraftBox = new THREE.Box3().setFromObject(aircraft);
                for (let i = 0; i < collidableObjects.length; i++) {
                    const buildingBox = new THREE.Box3().setFromObject(collidableObjects[i]);
                    if (aircraftBox.intersectsBox(buildingBox)) {
                        triggerCrash();
                        break;
                    }
                }
            }

            function triggerCrash() {
                isCrashed = true;
                bgAudio.pause();
                document.getElementById("crashScreen").style.display = "flex";
            }

            // حلقة التشغيل والتحريك المستمر
            function animate() {
                requestAnimationFrame(animate);
                updateFlight();

                // جعل الكاميرا تتبع الطائرة من مسافة سينمائية تظهر تفاصيل الأجنحة والممر بدقة
                const offset = new THREE.Vector3(0, 7, 36).applyQuaternion(aircraft.quaternion);
                camera.position.copy(aircraft.position).add(offset);
                camera.lookAt(aircraft.position.clone().add(new THREE.Vector3(0, 1.5, -8).applyQuaternion(aircraft.quaternion)));

                // تحديث الواجهة الرقمية
                hud.innerHTML = `<b>السرعة:</b> ${Math.round(speed * 1200)} عقدة<br><b>الارتفاع:</b> ${Math.round((altitude - 2) * 20)} قدم<br><b>الوقود:</b> ${Math.round(fuel)} %`;
                phaseDiv.innerText = `الوضعية: ${flightPhase}`;

                renderer.render(scene, camera);
            }

            window.addEventListener("resize", () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();

        } catch (error) {
            console.error("حدث خطأ:", error);
        }
    });
</script>
</body>
</html>
