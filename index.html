<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي الطيران اليمني ثلاثي الأبعاد</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a2a3a; font-family: sans-serif; }
        #mobilePanel { position: fixed; bottom: 20px; left: 20px; z-index: 1000; direction: ltr; display: flex; flex-wrap: wrap; width: 220px; }
        #mobilePanel button { width: 60px; height: 60px; font-size: 24px; margin: 4px; background: rgba(255,255,255,0.8); border: 2px solid #333; border-radius: 12px; cursor: pointer; -webkit-user-select: none; user-select: none; font-weight: bold; }
        #mobilePanel button:active { background: #00ffcc; }
        #hudPanel { position: fixed; top: 10px; right: 10px; color: white; font-size: 16px; background: rgba(0,0,0,0.6); padding: 12px; z-index: 1000; border-radius: 8px; line-height: 1.5; text-align: right; direction: rtl; border: 1px solid rgba(255,255,255,0.2); }
        #phaseDisplay { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); color: #00ffcc; font-size: 20px; font-weight: bold; background: rgba(0,0,0,0.7); padding: 6px 16px; border-radius: 5px; z-index: 1000; text-shadow: 0 0 5px #00ffcc; text-align: center; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

<div id="mobilePanel">
    <button id="upBtn">▲</button>
    <button id="downBtn">▼</button>
    <button id="leftBtn">◀</button>
    <button id="rightBtn">▶</button>
    <button id="pitchUpBtn">W</button>
    <button id="pitchDownBtn">S</button>
</div>

<script>
    // التأكد من تحميل مكتبة Three.js قبل تشغيل الكود لمنع الشاشة السوداء
    window.addEventListener('DOMContentLoaded', () => {
        try {
            // =====================================
            // إعداد المشهد والكاميرا والمحرك
            // =====================================
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 20000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // الإضاءة
            const ambient = new THREE.AmbientLight(0xffffff, 0.9);
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(500, 800, 500);
            scene.add(sun);

            // الأرضية
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(15000, 15000),
                new THREE.MeshStandardMaterial({ color: 0x2e7d32 })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // =====================================
            // المطارات
            // =====================================
            const airports = [];
            function createAirport(name, x, z) {
                const runway = new THREE.Mesh(new THREE.BoxGeometry(80, 0.1, 1000), new THREE.MeshStandardMaterial({ color: 0x333333 }));
                runway.position.set(x, 0.05, z);
                scene.add(runway);

                const terminal = new THREE.Mesh(new THREE.BoxGeometry(120, 25, 60), new THREE.MeshStandardMaterial({ color: 0xcccccc }));
                terminal.position.set(x + 120, 12, z);
                scene.add(terminal);

                airports.push({ name: name, position: new THREE.Vector3(x, 0, z) });
            }
            createAirport("مطار صنعاء", 0, 0);
            createAirport("مطار عدن", 2500, 3000);
            createAirport("مطار المكلا", -3200, 2800);

            // البيئة المحيطة (الغيوم والمباني الخفيفة لتناسب الهواتف)
            for (let i = 0; i < 60; i++) {
                const cloud = new THREE.Mesh(new THREE.SphereGeometry(20, 8, 8), new THREE.MeshStandardMaterial({ color: 0xffffff }));
                cloud.position.set((Math.random() - 0.5) * 10000, 200 + Math.random() * 200, (Math.random() - 0.5) * 10000);
                scene.add(cloud);
            }

            const buildings = [];
            for (let i = 0; i < 200; i++) {
                const h = 40 + Math.random() * 120;
                const building = new THREE.Mesh(new THREE.BoxGeometry(20, h, 20), new THREE.MeshStandardMaterial({ color: 0x555555 }));
                let x = (Math.random() - 0.5) * 6000;
                let z = (Math.random() - 0.5) * 6000;
                if (Math.sqrt(x*x + z*z) > 500) {
                    building.position.set(x, h / 2, z);
                    scene.add(building);
                    buildings.push(building);
                }
            }

            // =====================================
            // بناء الطائرة الافتراضية فوراً (حماية ضد الشاشة السوداء)
            // =====================================
            const aircraft = new THREE.Group();
            aircraft.position.set(0, 2, 0);
            scene.add(aircraft);

            // الطائرة البرمجية الجاهزة فوراً
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const wingMat = new THREE.MeshStandardMaterial({ color: 0xff3333 });
            const body = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 18, 16), bodyMat);
            body.rotation.z = Math.PI / 2;
            aircraft.add(body);
            const wing = new THREE.Mesh(new THREE.BoxGeometry(22, 0.3, 4), wingMat);
            aircraft.add(wing);
            const tail = new THREE.Mesh(new THREE.BoxGeometry(6, 0.3, 2), wingMat);
            tail.position.set(-8, 0, 0);
            aircraft.add(tail);

            // محاولة جلب مجسم 3D الاحترافي في الخلفية دون تعطيل اللعبة
            if (typeof THREE.GLTFLoader !== 'undefined') {
                const loader = new THREE.GLTFLoader();
                const airplaneURL = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Airplane/glTF-Binary/Airplane.glb';
                loader.load(airplaneURL, function (gltf) {
                    // إذا نجح التحميل، نقوم بإزالة الطائرة البدائية واستبدالها
                    while(aircraft.children.length > 0){ aircraft.remove(aircraft.children[0]); }
                    const model = gltf.scene;
                    model.scale.set(0.18, 0.18, 0.18);
                    model.rotation.y = Math.PI;
                    aircraft.add(model);
                }, undefined, function(e) { console.log("الإنترنت مقيد، جاري الاستمرار بالطائرة المدمجة المضمونة."); });
            }

            // =====================================
            // فيزياء الحركة والتحكم
            // =====================================
            let speed = 0, fuel = 100, altitude = 2, pitch = 0, verticalSpeed = 0;
            let flightPhase = "تدريج (TAXI)";
            const keys = {};

            const hud = document.createElement("div"); hud.id = "hudPanel"; document.body.appendChild(hud);
            const phaseDiv = document.createElement("div"); phaseDiv.id = "phaseDisplay"; document.body.appendChild(phaseDiv);

            // ربط أزرار الشاشة باللمس للهواتف
            function bindBtn(id, action, stopAction) {
                const btn = document.getElementById(id);
                if (!btn) return;
                btn.addEventListener("touchstart", (e) => { e.preventDefault(); action(); });
                btn.addEventListener("touchend", () => { if(stopAction) stopAction(); });
                btn.addEventListener("mousedown", () => { action(); });
                btn.addEventListener("mouseup", () => { if(stopAction) stopAction(); });
            }

            bindBtn("upBtn", () => { keys["up"] = true; }, () => { keys["up"] = false; });
            bindBtn("downBtn", () => { keys["down"] = true; }, () => { keys["down"] = false; });
            bindBtn("leftBtn", () => { keys["left"] = true; }, () => { keys["left"] = false; });
            bindBtn("rightBtn", () => { keys["right"] = true; }, () => { keys["right"] = false; });
            bindBtn("pitchUpBtn", () => { keys["w"] = true; }, () => { keys["w"] = false; });
            bindBtn("pitchDownBtn", () => { keys["s"] = true; }, () => { keys["s"] = false; });

            // حلقة اللعب والتحديث المستمر
            function animate() {
                requestAnimationFrame(animate);

                // حركة الطائرة بناءً على الأزرار المضغوطة
                if (keys["up"] && fuel > 0) speed += 0.004;
                if (keys["down"]) speed -= 0.004;
                speed = Math.max(0, Math.min(0.8, speed)) * 0.995;

                if (keys["left"]) aircraft.rotation.y += 0.02;
                if (keys["right"]) aircraft.rotation.y -= 0.02;
                if (keys["w"]) pitch += 0.008;
                if (keys["s"]) pitch -= 0.008;
                pitch = Math.max(-0.4, Math.min(0.4, pitch));
                aircraft.rotation.z = -pitch;

                // نظام الرفع والارتفاع
                let lift = (speed > 0.2) ? (speed - 0.2) * 0.02 * (1 + pitch) : 0;
                verticalSpeed += lift - 0.003;
                altitude += verticalSpeed;

                if (altitude < 2) { altitude = 2; verticalSpeed = 0; }
                aircraft.position.y = altitude;

                flightPhase = altitude < 4 ? "تدريج (TAXI)" : "طيران مستقر (CRUISE)";

                // دفع الطائرة للأمام
                const direction = new THREE.Vector3(0, 0, -1).applyQuaternion(aircraft.quaternion);
                aircraft.position.addScaledVector(direction, speed * 10);
                fuel = Math.max(0, fuel - (speed * 0.005));

                // الكاميرا تتبع الطائرة من الخلف بنعومة
                const offset = new THREE.Vector3(0, 8, 45).applyQuaternion(aircraft.quaternion);
                camera.position.copy(aircraft.position).add(offset);
                camera.lookAt(aircraft.position);

                // تحديث الشاشات
                hud.innerHTML = `<b>السرعة:</b> ${Math.round(speed * 1200)} عقدة<br><b>الارتفاع:</b> ${Math.round(altitude * 10)} قدم<br><b>الوقود:</b> ${Math.round(fuel)} %`;
                phaseDiv.innerText = `الوضعية: ${flightPhase}`;

                renderer.render(scene, camera);
            }

            window.addEventListener("resize", () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();

        } catch (error) {
            console.error("حدث خطأ في تشغيل المحرك:", error);
        }
    });
</script>
</body>
</html>
