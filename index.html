<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Airbus A380 Flight Simulator</title>
<style>
  body { margin:0; overflow:hidden; background:#1a2a3a; font-family:sans-serif; }
  #hudLeft, #hudRight, #compass {
    position:fixed; z-index:2000; color:#fff; background:rgba(0,0,0,.55);
    padding:10px 12px; border-radius:10px; line-height:1.6; font-size:14px;
    border:1px solid rgba(255,255,255,.15);
    backdrop-filter: blur(4px);
  }
  #hudLeft { top:10px; left:10px; text-align:left; min-width:180px; }
  #hudRight { top:10px; right:10px; text-align:right; direction:rtl; min-width:190px; }
  #compass { top:120px; left:10px; min-width:190px; }
  #compassBar {
    height:10px; border-radius:999px; background:linear-gradient(90deg,#00ffcc,#ffffff,#00ffcc);
    position:relative; overflow:hidden; margin-top:8px;
  }
  #compassNeedle {
    position:absolute; top:-4px; width:2px; height:18px; background:#ff3b3b;
    left:50%; transform:translateX(-50%);
    box-shadow:0 0 8px #ff3b3b;
  }
  #mobilePanel { position:fixed; bottom:20px; left:20px; z-index:3000; display:flex; flex-wrap:wrap; width:230px; direction:ltr; }
  #mobilePanel button {
    width:70px; height:56px; margin:4px; border-radius:12px; border:2px solid #333;
    background:rgba(255,255,255,.92); font-weight:bold; cursor:pointer; user-select:none;
  }
  #mobilePanel button:active { background:#00ffcc; }
  #phaseDisplay {
    position:fixed; top:10px; left:50%; transform:translateX(-50%);
    z-index:2500; color:#00ffcc; background:rgba(0,0,0,.72); padding:8px 16px;
    border-radius:8px; font-weight:bold; text-shadow:0 0 8px #00ffcc;
  }
  #crashScreen {
    display:none; position:fixed; inset:0; background:rgba(200,0,0,.9); z-index:5000;
    justify-content:center; align-items:center; flex-direction:column; color:#fff;
    font-size:30px; font-weight:bold; cursor:pointer;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

<div id="crashScreen" onclick="location.reload()">
  <div>💥 تحطمت الطائرة! 💥</div>
  <div style="font-size:18px;margin-top:15px;">اضغط لإعادة المحاولة</div>
</div>

<div id="hudLeft"></div>
<div id="hudRight"></div>

<div id="compass">
  <div>البوصلة</div>
  <div id="compassBar"><div id="compassNeedle"></div></div>
  <div id="compassText" style="margin-top:6px;">Heading: 0°</div>
</div>

<div id="phaseDisplay">الوضعية: INIT</div>

<div id="mobilePanel">
  <button id="upBtn">زيادة سرعة</button>
  <button id="downBtn">فرملة</button>
  <button id="leftBtn">يسار</button>
  <button id="rightBtn">يمين</button>
  <button id="pitchUpBtn">إقلاع ↑</button>
  <button id="pitchDownBtn">هبوط ↓</button>
</div>

<script>
window.addEventListener('DOMContentLoaded', () => {
  try {
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x7ec0ee);
    scene.fog = new THREE.FogExp2(0x7ec0ee, 0.00002);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 200000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.95));
    const sun = new THREE.DirectionalLight(0xffffff, 1.4);
    sun.position.set(5000, 10000, 8000);
    scene.add(sun);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(300000, 300000),
      new THREE.MeshStandardMaterial({ color: 0x3f8b57, roughness: 1 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1;
    scene.add(ground);

    const runwayGroup = new THREE.Group();
    const runway = new THREE.Mesh(
      new THREE.BoxGeometry(300, 1, 15000),
      new THREE.MeshStandardMaterial({ color: 0x202020, roughness: 0.95 })
    );
    runway.position.y = 0;
    runwayGroup.add(runway);

    for (let z = -7200; z <= 7200; z += 220) {
      const mark = new THREE.Mesh(
        new THREE.BoxGeometry(10, 0.2, 100),
        new THREE.MeshStandardMaterial({ color: 0xffffff })
      );
      mark.position.set(0, 0.7, z);
      runwayGroup.add(mark);
    }
    scene.add(runwayGroup);

    const collidables = [];

    function createBuilding(x, z, scale = 1) {
      const w = (60 + Math.random() * 80) * scale;
      const h = (180 + Math.random() * 700) * scale;
      const d = (60 + Math.random() * 80) * scale;
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.45 })
      );
      mesh.position.set(x, h / 2, z);
      scene.add(mesh);
      collidables.push(mesh);
    }

    for (let i = 0; i < 500; i++) {
      const x = (Math.random() - 0.5) * 80000;
      const z = (Math.random() - 0.5) * 80000;
      if (Math.abs(x) > 1000 || Math.abs(z) > 8000) createBuilding(x, z);
    }

    let aircraft = null;
    let aircraftReady = false;

    function initAircraftSystem() {
      if (!aircraft) return;
      scene.add(aircraft);
      aircraftReady = true;
      updateCameraPosition();
    }

    function loadA380() {
      const loader = new THREE.GLTFLoader();
      loader.load(
        'airbus-a380.glb',
        (gltf) => {
          aircraft = gltf.scene;
          const box = new THREE.Box3().setFromObject(aircraft);
          const size = box.getSize(new THREE.Vector3());
          const maxDim = Math.max(size.x, size.y, size.z);
          const scale = 120 / maxDim;
          aircraft.scale.setScalar(scale);
          
          aircraft.position.set(0, 12, 5200);
          aircraft.rotation.set(0, Math.PI, 0);
          aircraft.traverse(o => {
            if (o.isMesh) {
              o.castShadow = true;
              o.receiveShadow = true;
            }
          });
          initAircraftSystem();
        },
        undefined,
        (err) => {
          console.warn('GLB Load failed. Triggering fallback mesh.');
          aircraft = buildFallbackPlane();
          aircraft.position.set(0, 12, 5200);
          aircraft.rotation.set(0, Math.PI, 0);
          initAircraftSystem();
        }
      );
    }

    function buildFallbackPlane() {
      const g = new THREE.Group();
      const white = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.35 });
      const blue = new THREE.MeshStandardMaterial({ color: 0x0a3c7a, roughness: 0.45 });
      const dark = new THREE.MeshStandardMaterial({ color: 0x111111 });

      const body = new THREE.Mesh(new THREE.CylinderGeometry(4, 4, 60, 18), white);
      body.rotation.z = Math.PI / 2;
      g.add(body);

      const nose = new THREE.Mesh(new THREE.ConeGeometry(4, 12, 18), white);
      nose.rotation.z = -Math.PI / 2;
      nose.position.x = 36;
      g.add(nose);

      const wingShape = new THREE.Shape();
      wingShape.moveTo(0, 0);
      wingShape.lineTo(30, -5);
      wingShape.lineTo(50, -15);
      wingShape.lineTo(25, -12);
      wingShape.lineTo(0, -5);
      const wingGeo = new THREE.ExtrudeGeometry(wingShape, { depth: 0.5, bevelEnabled: false });

      const wingR = new THREE.Mesh(wingGeo, blue);
      wingR.rotation.x = Math.PI / 2;
      wingR.position.set(0, -1, 4);
      g.add(wingR);

      const wingL = new THREE.Mesh(wingGeo, blue);
      wingL.rotation.x = -Math.PI / 2;
      wingL.position.set(0, -1, -4);
      g.add(wingL);

      g.scale.set(1.5, 1.5, 1.5);
      return g;
    }

    loadA380();

    let keys = {};
    let speed = 0;
    let altitude = 8;
    let pitch = 0;
    let roll = 0;
    let yaw = Math.PI;
    let fuel = 100;
    let crashed = false;
    let lat = 51.4700;
    let lon = -0.4543;
    let destLat = 48.8566;
    let destLon = 2.3522;
    let phase = 'READY';

    function bindBtn(id, key) {
      const b = document.getElementById(id);
      if(!b) return;
      b.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true; });
      b.addEventListener('touchend', () => keys[key] = false);
      b.addEventListener('mousedown', () => keys[key] = true);
      b.addEventListener('mouseup', () => keys[key] = false);
      b.addEventListener('mouseleave', () => keys[key] = false);
    }

    bindBtn('upBtn', 'up');
    bindBtn('downBtn', 'down');
    bindBtn('leftBtn', 'left');
    bindBtn('rightBtn', 'right');
    bindBtn('pitchUpBtn', 'w');
    bindBtn('pitchDownBtn', 's');

    const hudLeft = document.getElementById('hudLeft');
    const hudRight = document.getElementById('hudRight');
    const phaseDisplay = document.getElementById('phaseDisplay');
    const compassText = document.getElementById('compassText');
    const compassNeedle = document.getElementById('compassNeedle');

    function getDistanceKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(a));
    }

    function updateCameraPosition() {
      if (!aircraft) return;
      const relativeCameraOffset = new THREE.Vector3(0, 35, 180);
      const cameraOffset = relativeCameraOffset.applyMatrix4(aircraft.matrixWorld);
      camera.position.copy(cameraOffset);
      
      const targetPosition = new THREE.Vector3(0, 10, -50).applyMatrix4(aircraft.matrixWorld);
      camera.lookAt(targetPosition);
    }

    function updateFlight(dt) {
      if (crashed || !aircraft || !aircraftReady) return;

      if (keys.up && fuel > 0) speed += 0.1 * dt;
      if (keys.down) speed -= 0.12 * dt;
      speed = THREE.MathUtils.clamp(speed, 0, 2.0);

      if (keys.left) yaw += 0.6 * dt;
      if (keys.right) yaw -= 0.6 * dt;

      if (keys.w) pitch += 0.4 * dt;
      else if (keys.s) pitch -= 0.4 * dt;
      else pitch *= 0.95;

      pitch = THREE.MathUtils.clamp(pitch, -0.35, 0.35);
      roll = THREE.MathUtils.lerp(roll, (keys.left ? 0.5 : 0) + (keys.right ? -0.5 : 0), 0.1);

      aircraft.rotation.set(pitch, yaw, roll, 'YXZ');

      const thrust = speed * 24;
      const lift = Math.max(0, speed - 0.2) * (0.35 + pitch * 1.7);
      const gravity = 0.28;

      altitude += (lift * 8 - gravity) * dt;
      altitude = Math.max(0, altitude);
      aircraft.position.y = altitude + 0.8;

      const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(aircraft.quaternion).normalize();
      aircraft.position.addScaledVector(forward, thrust * dt * 20);

      fuel = Math.max(0, fuel - speed * 0.01 * dt);

      const headingDeg = ((THREE.MathUtils.radToDeg(yaw) % 360) + 360) % 360;
      compassText.innerText = `Heading: ${Math.round(headingDeg)}°`;
      compassNeedle.style.transform = `translateX(-50%) rotate(${headingDeg}deg)`;

      lat += Math.sin(headingDeg * Math.PI / 180) * speed * dt * 0.0005;
      lon += Math.cos(headingDeg * Math.PI / 180) * speed * dt * 0.0005;

      if (aircraft.position.y < 1.5 && speed > 0.5) {
        crashed = true;
        document.getElementById('crashScreen').style.display = 'flex';
      }

      const distanceToParis = getDistanceKm(lat, lon, destLat, destLon);
      phase = altitude < 20 ? 'TAKEOFF/LANDING' : 'CRUISE';

      hudLeft.innerHTML = `
        <b>Speed:</b> ${Math.round(speed * 140)} kt<br>
        <b>Altitude:</b> ${Math.round(altitude * 100)} ft<br>
        <b>Fuel:</b> ${Math.round(fuel)}%<br>
        <b>Phase:</b> ${phase}
      `;
      hudRight.innerHTML = `
        <b>Lat:</b> ${lat.toFixed(4)}<br>
        <b>Lon:</b> ${lon.toFixed(4)}<br>
        <b>Destination:</b> Paris<br>
        <b>Distance:</b> ${distanceToParis.toFixed(0)} km
      `;
      phaseDisplay.innerText = `الوضعية: ${phase}`;
    }

    let last = performance.now();
    function animate(now) {
      requestAnimationFrame(animate);
      const dt = Math.min(0.033, (now - last) / 1000);
      last = now;

      updateFlight(dt);
      updateCameraPosition();

      renderer.render(scene, camera);
    }
    requestAnimationFrame(animate);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  } catch (e) { console.error(e); }
});
</script>
</body>
</html>
