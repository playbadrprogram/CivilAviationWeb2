<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي الطيران الاحترافي - نظام الهبوط المطور</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a2a3a; font-family: sans-serif; }
        #mobilePanel { position: fixed; bottom: 20px; left: 20px; z-index: 1000; direction: ltr; display: flex; flex-wrap: wrap; width: 220px; }
        #mobilePanel button { width: 60px; height: 60px; font-size: 15px; margin: 4px; background: rgba(255,255,255,0.9); border: 2px solid #333; border-radius: 12px; cursor: pointer; -webkit-user-select: none; user-select: none; font-weight: bold; }
        #mobilePanel button:active { background: #00ffcc; }
        #hudPanel { position: fixed; top: 10px; right: 10px; color: white; font-size: 16px; background: rgba(0,0,0,0.6); padding: 12px; z-index: 1000; border-radius: 8px; line-height: 1.5; text-align: right; direction: rtl; border: 1px solid rgba(255,255,255,0.2); }
        #phaseDisplay { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); color: #00ffcc; font-size: 20px; font-weight: bold; background: rgba(0,0,0,0.7); padding: 6px 16px; border-radius: 5px; z-index: 1000; text-shadow: 0 0 5px #00ffcc; text-align: center; }
        #crashScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(200,0,0,0.9); z-index: 5000; justify-content: center; align-items: center; flex-direction: column; color: white; font-size: 30px; font-weight: bold; cursor: pointer; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="crashScreen" onclick="location.reload()">
    <div>💥 تحطمت الطائرة! 💥</div>
    <div style="font-size: 18px; margin-top: 15px;">إضغط هنا لإعادة المحاولة</div>
</div>

<div id="mobilePanel">
    <button id="upBtn">زيادة سرعة</button>
    <button id="downBtn">فرملة</button>
    <button id="leftBtn">يسار</button>
    <button id="rightBtn">يمين</button>
    <button id="pitchUpBtn">إقلاع ↑</button>
    <button id="pitchDownBtn">هبوط ↓</button>
</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        try {
            // =====================================
            // نظام الصوت النفاث الاصطناعي
            // =====================================
            let audioCtx = null;
            let mainOsc = null;
            let mainGain = null;

            function initAudio() {
                if (audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                mainOsc = audioCtx.createOscillator();
                mainOsc.type = 'sawtooth'; 
                mainOsc.frequency.setValueAtTime(60, audioCtx.currentTime);

                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(300, audioCtx.currentTime);

                mainGain = audioCtx.createGain();
                mainGain.gain.setValueAtTime(0.0, audioCtx.currentTime);

                mainOsc.connect(filter);
                filter.connect(mainGain);
                mainGain.connect(audioCtx.destination);
                
                mainOsc.start();
            }

            function activateAudioContext() {
                initAudio();
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }
            document.body.addEventListener('touchstart', activateAudioContext);
            document.body.addEventListener('click', activateAudioContext);

            // =====================================
            // البيئة والمشهد العملاق
            // =====================================
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x7ec0ee); 
            scene.fog = new THREE.FogExp2(0x7ec0ee, 0.0001);

            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 120000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.85));
            const sun = new THREE.DirectionalLight(0xffffff, 1.3);
            sun.position.set(1000, 2000, 800);
            scene.add(sun);

            // الأرضية اللانهائية
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(150000, 150000),
                new THREE.MeshStandardMaterial({ color: 0x448a5f, roughness: 0.9 })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // =====================================
            // ممر الهبوط والإقلاع
            // =====================================
            const runwayGroup = new THREE.Group();
            const asphalt = new THREE.Mesh(
                new THREE.BoxGeometry(200, 0.2, 12000), // ممر أطول لرؤيته من بعيد
                new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.85 })
            );
            asphalt.position.set(0, 0.1, 0);
            runwayGroup.add(asphalt);

            for (let z = -5500; z <= 5500; z += 180) {
                const line = new THREE.Mesh(new THREE.BoxGeometry(6, 0.25, 80), new THREE.MeshStandardMaterial({ color: 0xffffff }));
                line.position.set(0, 0.2, z);
                runwayGroup.add(line);
            }
            scene.add(runwayGroup);

            // =====================================
            // توليد مباني المدينة
            // =====================================
            const collidableObjects = [];
            function createRealisticBuilding(x, z) {
                const w = 60 + Math.random() * 60;
                const h = 200 + Math.random() * 600;
                const d = 60 + Math.random() * 60;

                const bMesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.4 }));
                bMesh.position.set(x, h / 2, z);
                scene.add(bMesh);
                collidableObjects.push(bMesh);

                const winGeo = new THREE.BoxGeometry(w + 1, 2.5, d + 1);
                const winMat = new THREE.MeshStandardMaterial({ color: 0xfff7e6, emissive: 0xffcc00, emissiveIntensity: 0.6 });
                for (let y = 40; y < h - 30; y += 40) {
                    const row = new THREE.Mesh(winGeo, winMat);
                    row.position.set(x, y, z);
                    scene.add(row);
                }
            }

            for (let i = 0; i < 700; i++) {
                let bx = (Math.random() - 0.5) * 60000;
                let bz = (Math.random() - 0.5) * 60000;
                if (Math.abs(bx) > 500 || Math.abs(bz) > 6500) {
                    createRealisticBuilding(bx, bz);
                }
            }

            // =====================================
            // تصميم الطائرة
            // =====================================
            function buildAdvancedAircraft() {
                const group = new THREE.Group();
                const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
                const blueMat = new THREE.MeshStandardMaterial({ color: 0x0a3c7a, roughness: 0.4 });
                const darkMat = new THREE.MeshStandardMaterial({ color: 0x111111 });

                const body = new THREE.Mesh(new THREE.CylinderGeometry(1.4, 1.1, 20, 16), whiteMat);
                body.rotation.x = Math.PI / 2; group.add(body);

                const nose = new THREE.Mesh(new THREE.ConeGeometry(1.4, 4, 16), whiteMat);
                nose.rotation.x = -Math.PI / 2; nose.position.z = -12; group.add(nose);

                const cockpit = new THREE.Mesh(new THREE.SphereGeometry(0.8, 8, 8), darkMat);
                cockpit.position.set(0, 0.6, -11.4); cockpit.scale.set(1.3, 0.5, 1.6); group.add(cockpit);

                const wingShape = new THREE.Shape();
                wingShape.moveTo(0, 0); wingShape.lineTo(14, -4); wingShape.lineTo(13.5, -5.5); wingShape.lineTo(0, -2.5);
                const extrudeSettings = { depth: 0.2, bevelEnabled: true, bevelSegments: 2, steps: 1, bevelSize: 0.05, bevelThickness: 0.05 };
                
                const wingR = new THREE.Mesh(new THREE.ExtrudeGeometry(wingShape, extrudeSettings), whiteMat);
                wingR.rotation.x = Math.PI / 2; wingR.position.set(0.8, -0.2, 1); group.add(wingR);

                const wingL = new THREE.Mesh(new THREE.ExtrudeGeometry(wingShape, extrudeSettings), whiteMat);
                wingL.rotation.x = Math.PI / 2; wingL.rotation.y = Math.PI; wingL.position.set(-0.8, -0.2, 1); group.add(wingL);

                const tailFin = new THREE.Mesh(new THREE.BoxGeometry(0.3, 4.5, 3.5), blueMat);
                tailFin.position.set(0, 2.5, 9); tailFin.rotation.x = -Math.PI / 5; group.add(tailFin);

                group.scale.set(0.385, 0.385, 0.385);
                return group;
            }

            const aircraft = buildAdvancedAircraft();
            aircraft.position.set(0, 2.2, 5000); 
            scene.add(aircraft);

            // =====================================
            // نظام الحركة والتحكم بالهبوط المطور
            // =====================================
            let speed = 0, fuel = 100, altitude = 2.2, pitch = 0;
            let flightPhase = "تدريج (TAXI)";
            let isCrashed = false;
            const keys = {};

            const hud = document.createElement("div"); hud.id = "hudPanel"; document.body.appendChild(hud);
            const phaseDiv = document.createElement("div"); phaseDiv.id = "phaseDisplay"; document.body.appendChild(phaseDiv);

            function bindBtn(id, key) {
                const btn = document.getElementById(id); if (!btn) return;
                btn.addEventListener("touchstart", (e) => { e.preventDefault(); activateAudioContext(); keys[key] = true; });
                btn.addEventListener("touchend", () => { keys[key] = false; });
                btn.addEventListener("mousedown", () => { activateAudioContext(); keys[key] = true; });
                btn.addEventListener("mouseup", () => { keys[key] = false; });
            }

            bindBtn("upBtn", "up"); bindBtn("downBtn", "down");
            bindBtn("leftBtn", "left"); bindBtn("rightBtn", "right");
            bindBtn("pitchUpBtn", "w"); bindBtn("pitchDownBtn", "s");

            function updateFlight() {
                if (isCrashed) return;

                // نظام السرعة والوقود
                if (keys["up"] && fuel > 0) speed += 0.008;
                if (keys["down"]) speed -= 0.008;
                speed = Math.max(0, Math.min(1.0, speed)) * 0.995;

                if (mainGain && mainOsc) {
                    mainGain.gain.setTargetAtTime(speed * 0.25, audioCtx.currentTime, 0.1);
                    mainOsc.frequency.setTargetAtTime(60 + (speed * 140), audioCtx.currentTime, 0.1);
                }

                // الالتفاف الكامل بزاوية 360 درجة للعودة للمطار
                if (keys["left"]) aircraft.rotation.y += 0.025;
                if (keys["right"]) aircraft.rotation.y -= 0.025;
                
                // التحكم القسري في أنف الطائرة (pitch) للإقلاع أو الهبوط الإجباري
                if (keys["w"]) {
                    pitch += 0.015; // رفع الأنف للأعلى
                } else if (keys["s"]) {
                    pitch -= 0.015; // خفض الأنف للأسفل فوراً للنزول
                } else {
                    pitch *= 0.96; // استقرار تلقائي تدريجي عند ترك الأزرار لئلا تستمر بالارتفاع التلقائي
                }
                pitch = Math.max(-0.4, Math.min(0.4, pitch));
                aircraft.rotation.x = pitch;

                // معادلة الارتفاع الفيزيائية المعتمدة على السرعة وزاوية الأنف
                // إذا كان الأنف متجهاً للأسفل (pitch < 0)، ستنزل الطائرة حتى لو كانت سريعة
                let lift = (speed > 0.2) ? pitch * speed * 4.5 : 0; 
                
                // إضافة الجاذبية الطبيعية
                if (altitude > 2.2) {
                    altitude += lift - 0.1; // الجاذبية تسحب الطائرة لأسفل باستمرار عند غياب الرفع
                } else {
                    altitude += lift;
                }

                // نظام أمان الهبوط على المدرج والاستقرار
                if (altitude < 2.2) { 
                    altitude = 2.2; 
                    if (pitch < 0) pitch = 0; // استواء الطائرة تماماً عند ملامسة الأرض
                }
                aircraft.position.y = altitude;

                flightPhase = altitude < 3.8 ? "تدريج (TAXI)" : "طيران مستقر (CRUISE)";

                // دفع الطائرة للأمام باتجاه أنفها الحالي
                const direction = new THREE.Vector3(0, 0, -1).applyQuaternion(aircraft.quaternion);
                aircraft.position.addScaledVector(direction, speed * 22);
                fuel = Math.max(0, fuel - (speed * 0.002));

                // فحص الاصطدام بالمباني
                const aircraftBox = new THREE.Box3().setFromObject(aircraft);
                for (let i = 0; i < collidableObjects.length; i++) {
                    const bBox = new THREE.Box3().setFromObject(collidableObjects[i]);
                    if (aircraftBox.intersectsBox(bBox)) {
                        isCrashed = true;
                        if (mainGain) mainGain.gain.setValueAtTime(0, audioCtx.currentTime);
                        document.getElementById("crashScreen").style.display = "flex";
                        break;
                    }
                }
            }

            function animate() {
                requestAnimationFrame(animate);
                updateFlight();

                const offset = new THREE.Vector3(0, 6.5, 34).applyQuaternion(aircraft.quaternion);
                camera.position.copy(aircraft.position).add(offset);
                camera.lookAt(aircraft.position.clone().add(new THREE.Vector3(0, 1.2, -6).applyQuaternion(aircraft.quaternion)));

                hud.innerHTML = `<b>السرعة:</b> ${Math.round(speed * 1200)} عقدة<br><b>الارتفاع:</b> ${Math.round((altitude - 2.2) * 20)} قدم<br><b>الوقود:</b> ${Math.round(fuel)} %`;
                phaseDiv.innerText = `الوضعية: ${flightPhase}`;

                renderer.render(scene, camera);
            }

            window.addEventListener("resize", () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();

        } catch (e) { console.error(e); }
    });
</script>
</body>
</html>
